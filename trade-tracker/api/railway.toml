[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# No startCommand here on purpose: Railway does not shell-expand a bare
# "$PORT" in startCommand the way you'd expect from a shell script, so a
# literal "$PORT" string gets passed to uvicorn's --port flag instead of the
# actual port number. Falls back to the Dockerfile's CMD instead, which is
# shell-wrapped ("sh -c ...") and expands ${PORT:-8000} correctly.
#
# Required environment variables (set these in Railway dashboard):
#
#   DATABASE_URL     = ${{Postgres.DATABASE_URL}} (reference, not a literal value)
#   AUTH_ENABLED     = true
#   GOOGLE_CLIENT_ID = (from Google Cloud Console — see docs/DEPLOY_GOOGLE_OAUTH.md)
#   ALLOWED_EMAIL_DOMAIN = dekalbcapitalmanagement.com
#   FRONTEND_URL     = (Cloudflare Pages URL — see docs/DEPLOY_CLOUDFLARE_PAGES.md)
#
#   IBKR_ENABLED     = true
#   IBKR_ACCOUNT_ID, IBKR_CLIENT_ID, IBKR_CLIENT_KEY_ID, IBKR_CREDENTIAL,
#   IBKR_PRIVATE_KEY, IBKR_SERVER_IP = see README's "IBKR Web API Setup"
